spring.application.name=user-service
server.port=8081
spring.jackson.serialization.indent-output=true
spring.config.import=optional:classpath:application.properties
app.messaging.rabbit.enabled=false
app.security.jwt.secret=${JWT_SECRET:replace-this-with-a-long-random-secret-key-for-user-service}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
