spring.application.name=audit-service
server.port=8084
spring.jackson.serialization.indent-output=true
spring.config.import=optional:classpath:application.properties

app.messaging.rabbit.enabled=${RABBIT_ENABLED:true}
app.messaging.rabbit.exchange=thesis.workflow.exchange
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.username=${RABBIT_USERNAME:guest}
spring.rabbitmq.password=${RABBIT_PASSWORD:guest}
